name: Propose to SpecPM

on:
  workflow_dispatch:
    inputs:
      candidate_dir:
        description: Candidate SpecPackage directory inside SpecHarvester.
        required: true
        default: candidates/github.com/xyflow/xyflow
      package_id:
        description: Candidate package id.
        required: true
        default: xyflow.core
      package_version:
        description: Candidate package version.
        required: true
        default: 0.1.0
      create_pr:
        description: Push a branch and open a SpecPM PR. Leave false for dry-run smoke.
        required: true
        type: boolean
        default: false
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

jobs:
  propose:
    name: Propose accepted source diff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        vars.SPECHARVESTER_AUTO_PROPOSE_TO_SPECPM == 'true'
      )

    steps:
      - name: Checkout SpecHarvester
        uses: actions/checkout@v4
        with:
          path: SpecHarvester
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Checkout SpecPM
        uses: actions/checkout@v4
        with:
          repository: 0al-spec/SpecPM
          path: SpecPM
          persist-credentials: false

      - name: Configure proposal
        id: config
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_CANDIDATE_DIR: ${{ github.event.inputs.candidate_dir }}
          INPUT_PACKAGE_ID: ${{ github.event.inputs.package_id }}
          INPUT_PACKAGE_VERSION: ${{ github.event.inputs.package_version }}
          INPUT_CREATE_PR: ${{ github.event.inputs.create_pr }}
          VAR_CANDIDATE_DIR: ${{ vars.SPECHARVESTER_CANDIDATE_DIR }}
          VAR_PACKAGE_ID: ${{ vars.SPECHARVESTER_PACKAGE_ID }}
          VAR_PACKAGE_VERSION: ${{ vars.SPECHARVESTER_PACKAGE_VERSION }}
        run: |
          candidate_dir="${INPUT_CANDIDATE_DIR:-${VAR_CANDIDATE_DIR:-candidates/github.com/xyflow/xyflow}}"
          package_id="${INPUT_PACKAGE_ID:-${VAR_PACKAGE_ID:-xyflow.core}}"
          package_version="${INPUT_PACKAGE_VERSION:-${VAR_PACKAGE_VERSION:-0.1.0}}"
          create_pr="${INPUT_CREATE_PR:-false}"
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            create_pr="true"
          fi
          package_subdir="${package_id}/${package_version}"
          manifest_entry_path="public-index/generated/${package_subdir}"

          {
            echo "candidate_dir=$candidate_dir"
            echo "package_id=$package_id"
            echo "package_version=$package_version"
            echo "package_subdir=$package_subdir"
            echo "manifest_entry_path=$manifest_entry_path"
            echo "create_pr=$create_pr"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./SpecHarvester -e ./SpecPM

      - name: Validate candidate
        working-directory: SpecHarvester
        run: |
          test -d "${{ steps.config.outputs.candidate_dir }}"
          python -m specpm.cli validate "${{ steps.config.outputs.candidate_dir }}" --json

      - name: Preflight candidate identity and proposal inputs
        working-directory: SpecHarvester
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path
          from spec_harvester.promoter import read_manifest_identity, reject_symlinks

          candidate_dir = Path("${{ steps.config.outputs.candidate_dir }}")
          expected_id = "${{ steps.config.outputs.package_id }}"
          expected_version = "${{ steps.config.outputs.package_version }}"

          reject_symlinks(candidate_dir)

          identity = read_manifest_identity(candidate_dir / "specpm.yaml")
          if identity["id"] != expected_id:
              print(
                  json.dumps(
                      {
                          "error": "candidate id mismatch",
                          "candidateId": identity["id"],
                          "expectedId": expected_id,
                      }
                  ),
                  file=sys.stderr,
              )
              raise SystemExit(1)
          if identity["version"] != expected_version:
              print(
                  json.dumps(
                      {
                          "error": "candidate version mismatch",
                          "candidateVersion": identity["version"],
                          "expectedVersion": expected_version,
                      }
                  ),
                  file=sys.stderr,
              )
              raise SystemExit(1)
          print(
              json.dumps(
                  {
                      "status": "ok",
                      "packageId": identity["id"],
                      "packageVersion": identity["version"],
                  }
              )
          )
          PY

      - name: Build producer evidence artifacts
        id: producer_evidence
        working-directory: SpecHarvester
        run: |
          set -o pipefail
          evidence_root="/tmp/specpm-proposal-evidence"
          artifact_name="specpm-proposal-evidence-${{ steps.config.outputs.package_id }}-${{ steps.config.outputs.package_version }}"
          rm -rf "$evidence_root"
          mkdir -p "$evidence_root"

          python -m spec_harvester preflight-candidate-bundle \
            "${{ steps.config.outputs.candidate_dir }}" \
            | tee "$evidence_root/producer-preflight-report.json"

          python -m spec_harvester render-spec-site \
            --candidate "${{ steps.config.outputs.candidate_dir }}" \
            --output "$evidence_root/static-viewer"

          {
            echo "artifact_name=$artifact_name"
            echo "artifact_root=$evidence_root"
          } >> "$GITHUB_OUTPUT"

      - name: Upload producer evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.producer_evidence.outputs.artifact_name }}
          path: |
            ${{ steps.producer_evidence.outputs.artifact_root }}/producer-preflight-report.json
            ${{ steps.producer_evidence.outputs.artifact_root }}/static-viewer/**
          if-no-files-found: error

      - name: Promote into SpecPM checkout
        working-directory: SpecHarvester
        run: |
          python -m spec_harvester promote "${{ steps.config.outputs.candidate_dir }}" \
            --accepted-root ../SpecPM/public-index/generated \
            --manifest ../SpecPM/public-index/accepted-packages.yml \
            --manifest-entry-path "${{ steps.config.outputs.manifest_entry_path }}" \
            --package-subdir "${{ steps.config.outputs.package_subdir }}" \
            --specpm-command "python -m specpm.cli" \
            --force

      - name: Generate SpecPM public index
        working-directory: SpecPM
        run: |
          python -m specpm.cli public-index generate \
            --manifest public-index/accepted-packages.yml \
            --output /tmp/specpm-public-index \
            --registry http://localhost:8081 \
            --json
          test -f /tmp/specpm-public-index/v0/status/index.json
          test -f "/tmp/specpm-public-index/v0/packages/${{ steps.config.outputs.package_id }}/index.json"
          test -f /tmp/specpm-public-index/v0/intents/index.json

      - name: Summarize and preflight SpecPM diff
        id: diff
        working-directory: SpecPM
        run: |
          expected_package_dir="public-index/generated/${{ steps.config.outputs.package_subdir }}"
          git status --short
          changed_files="$(git diff --name-only -- public-index)"
          if [ -n "$changed_files" ]; then
            while IFS= read -r file; do
              if [ -z "$file" ]; then
                continue
              fi
              case "$file" in
                "${expected_package_dir}"*)
                  ;;
                public-index/accepted-packages.yml)
                  ;;
                *)
                  echo "::error ::Unexpected proposal diff path: ${file}"
                  exit 1
                  ;;
              esac
            done <<< "$changed_files"
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff -- public-index
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No SpecPM proposal diff was produced."
          fi

      - name: Create SpecPM pull request
        if: steps.config.outputs.create_pr == 'true' && steps.diff.outputs.has_changes == 'true'
        working-directory: SpecPM
        env:
          SPECPM_PROPOSAL_TOKEN: ${{ secrets.SPECPM_PROPOSAL_TOKEN }}
          GH_TOKEN: ${{ secrets.SPECPM_PROPOSAL_TOKEN }}
          PACKAGE_ID: ${{ steps.config.outputs.package_id }}
          PACKAGE_VERSION: ${{ steps.config.outputs.package_version }}
          CANDIDATE_DIR: ${{ steps.config.outputs.candidate_dir }}
          MANIFEST_ENTRY_PATH: ${{ steps.config.outputs.manifest_entry_path }}
          PACKAGE_SUBDIR: ${{ steps.config.outputs.package_subdir }}
          EVIDENCE_ARTIFACT: ${{ steps.producer_evidence.outputs.artifact_name }}
          HARVESTER_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SPECPM_PROPOSAL_TOKEN" ]; then
            echo "::error::SPECPM_PROPOSAL_TOKEN is required to create a SpecPM PR."
            exit 1
          fi

          safe_package_id="$(printf '%s' "$PACKAGE_ID" | tr -c 'A-Za-z0-9._-' '-')"
          branch="harvester/${safe_package_id}-${PACKAGE_VERSION}-${GITHUB_RUN_ID}"

          git config user.name "SpecHarvester Bot"
          git config user.email "actions@github.com"
          git checkout -b "$branch"
          git add public-index/generated public-index/accepted-packages.yml
          git commit -m "Add harvested SpecPackage ${PACKAGE_ID}"
          git remote set-url origin "https://x-access-token:${SPECPM_PROPOSAL_TOKEN}@github.com/0al-spec/SpecPM.git"
          git push origin "$branch"

          producer_evidence_json="$(python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          import os
          import yaml

          package_subdir = os.environ["PACKAGE_SUBDIR"]
          evidence_artifact = os.environ["EVIDENCE_ARTIFACT"]
          run_url = os.environ["RUN_URL"]
          candidate = Path("../SpecHarvester", os.environ["CANDIDATE_DIR"]).resolve()
          package = Path("public-index/generated", package_subdir)
          manifest_path = candidate / "specpm.yaml"

          def safe_relative_path(value):
              if not isinstance(value, str) or not value:
                  return None
              relative = Path(value)
              if relative.is_absolute() or ".." in relative.parts:
                  return None
              target = (candidate / relative).resolve()
              try:
                  target.relative_to(candidate)
              except ValueError:
                  return None
              return relative.as_posix()

          try:
              manifest = yaml.safe_load(manifest_path.read_text(encoding="utf-8"))
          except yaml.YAMLError as exc:
              raise SystemExit(f"candidate specpm.yaml is invalid YAML: {exc}") from exc
          if not isinstance(manifest, dict):
              raise SystemExit("candidate specpm.yaml must be a YAML object")

          boundary_spec_path = None
          specs = manifest.get("specs")
          if isinstance(specs, list):
              for entry in specs:
                  if not isinstance(entry, dict):
                      continue
                  boundary_spec_path = safe_relative_path(entry.get("path"))
                  if boundary_spec_path is not None:
                      break
          if boundary_spec_path is None:
              raise SystemExit("candidate specpm.yaml has no safe specs[].path")

          def digest(relative_path):
              path = package / relative_path
              if not path.is_file():
                  raise SystemExit(f"promoted package evidence file missing: {path}")
              return "sha256:" + hashlib.sha256(path.read_bytes()).hexdigest()

          links = [
              {
                  "role": "accepted_source_bundle",
                  "path": f"public-index/generated/{package_subdir}",
                  "pathScope": "repo_relative",
                  "required": True,
                  "status": "expected",
              },
              {
                  "role": "manifest",
                  "path": f"public-index/generated/{package_subdir}/specpm.yaml",
                  "pathScope": "repo_relative",
                  "required": True,
                  "status": "expected",
                  "digest": digest("specpm.yaml"),
              },
              {
                  "role": "boundary_spec",
                  "path": f"public-index/generated/{package_subdir}/{boundary_spec_path}",
                  "pathScope": "repo_relative",
                  "required": True,
                  "status": "expected",
                  "digest": digest(boundary_spec_path),
              },
              {
                  "role": "producer_receipt",
                  "path": f"public-index/generated/{package_subdir}/producer-receipt.json",
                  "pathScope": "repo_relative",
                  "required": True,
                  "status": "expected",
                  "digest": digest("producer-receipt.json"),
              },
              {
                  "role": "validation_report",
                  "path": f"public-index/generated/{package_subdir}/validation-report.json",
                  "pathScope": "repo_relative",
                  "required": True,
                  "status": "expected",
                  "digest": digest("validation-report.json"),
              },
              {
                  "role": "diagnostics",
                  "path": f"public-index/generated/{package_subdir}/diagnostics.json",
                  "pathScope": "repo_relative",
                  "required": True,
                  "status": "expected",
                  "digest": digest("diagnostics.json"),
              },
              {
                  "role": "producer_preflight",
                  "artifact": evidence_artifact,
                  "path": "producer-preflight-report.json",
                  "pathScope": "workflow_artifact",
                  "required": True,
                  "status": "present",
                  "url": run_url,
              },
              {
                  "role": "static_viewer",
                  "artifact": evidence_artifact,
                  "path": "static-viewer/index.html",
                  "pathScope": "workflow_artifact",
                  "required": False,
                  "status": "present",
                  "url": run_url,
              },
              {
                  "role": "accepted_source_diff",
                  "path": "pull-request-diff",
                  "pathScope": "pull_request",
                  "required": True,
                  "status": "expected",
              },
          ]
          print(json.dumps({"producerEvidenceLinks": links}, indent=2))
          PY
          )"
          boundary_spec_path="$(PRODUCER_EVIDENCE_JSON="$producer_evidence_json" python - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["PRODUCER_EVIDENCE_JSON"])
          for entry in payload["producerEvidenceLinks"]:
              if entry["role"] == "boundary_spec":
                  print(entry["path"].split(os.environ["PACKAGE_SUBDIR"] + "/", 1)[1])
                  break
          PY
          )"

          cat > /tmp/specpm-proposal-body.md <<EOF
          ## Motivation

          SpecHarvester generated and promoted a reviewed candidate package for \`${PACKAGE_ID}\`.

          ## Changes

          - Adds \`${MANIFEST_ENTRY_PATH}\`.
          - Updates \`public-index/accepted-packages.yml\`.

          ## Validation

          - SpecHarvester candidate validation passed.
          - SpecHarvester producer bundle preflight passed.
          - SpecHarvester static viewer rendered and was uploaded as workflow evidence.
          - \`specpm public-index generate\` passed in the proposal workflow.

          ## Producer Bundle Evidence

          - Accepted source bundle in this PR: \`public-index/generated/${PACKAGE_SUBDIR}\`
          - Manifest: \`public-index/generated/${PACKAGE_SUBDIR}/specpm.yaml\`
          - Boundary spec: \`public-index/generated/${PACKAGE_SUBDIR}/${boundary_spec_path}\`
          - Producer receipt: \`public-index/generated/${PACKAGE_SUBDIR}/producer-receipt.json\`
          - Validation report: \`public-index/generated/${PACKAGE_SUBDIR}/validation-report.json\`
          - Diagnostics report: \`public-index/generated/${PACKAGE_SUBDIR}/diagnostics.json\`
          - Producer preflight report: workflow artifact \`${EVIDENCE_ARTIFACT}\` from ${RUN_URL}
          - Static viewer evidence: workflow artifact \`${EVIDENCE_ARTIFACT}\` from ${RUN_URL}
          - Accepted-source diff: this pull request updates \`${MANIFEST_ENTRY_PATH}\` and \`public-index/accepted-packages.yml\`.

          \`\`\`json
          ${producer_evidence_json}
          \`\`\`

          \`\`\`json
          {
            "registryAcceptanceDecision": {
              "status": "external_required",
              "requiredFor": ["public_index_acceptance"],
              "authority": "SpecPM maintainer review",
              "recordKind": "SpecPMRegistryAcceptanceDecision",
              "recordLocation": "SpecPM pull request or accepted-source review record",
              "producerReceiptAuthority": "evidence_only"
            }
          }
          \`\`\`

          ## Boundaries

          - This PR is a registry source proposal, not autonomous publication.
          - SpecPM maintainers must review and merge before the package appears in public \`/v0\`.

          ## Provenance

          - SpecHarvester commit: \`${HARVESTER_SHA}\`
          - Workflow run: ${RUN_URL}
          EOF

          gh pr create \
            --repo 0al-spec/SpecPM \
            --head "$branch" \
            --base main \
            --title "Add harvested SpecPackage ${PACKAGE_ID}" \
            --body-file /tmp/specpm-proposal-body.md
