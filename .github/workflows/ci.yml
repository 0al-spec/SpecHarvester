name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format
        run: ruff format --check src tests

      - name: Pytest
        run: pytest --cov=spec_harvester --cov-report=term-missing --cov-fail-under=90

      - name: Swift package manifest validation
        run: |
          swift --version
          swift package dump-package >/dev/null

      - name: Swift docs target build
        run: swift build --target SpecHarvesterDocs

  specpm-integration:
    name: SpecPM integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout SpecHarvester
        uses: actions/checkout@v4
        with:
          path: SpecHarvester

      - name: Checkout SpecPM
        uses: actions/checkout@v4
        with:
          repository: 0al-spec/SpecPM
          path: SpecPM

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./SpecHarvester -e ./SpecPM

      - name: Build fixture repository
        run: |
          fixture=/tmp/spec-harvester-fixture
          mkdir -p "$fixture/packages/react/src"
          cat > "$fixture/README.md" <<'EOF'
          # Flow Fixture

          Test fixture for SpecHarvester CI.
          EOF
          cat > "$fixture/LICENSE" <<'EOF'
          MIT
          EOF
          cat > "$fixture/package.json" <<'EOF'
          {
            "name": "@example/flow-fixture",
            "version": "0.1.0",
            "description": "React library for building node-based editors and interactive flow charts.",
            "license": "MIT",
            "devDependencies": {
              "typescript": "^5.0.0"
            }
          }
          EOF
          cat > "$fixture/packages/react/src/index.js" <<'EOF'
          export function createFlowFixture(options) {
            return { options };
          }
          EOF
          cat > "$fixture/packages/react/package.json" <<'EOF'
          {
            "name": "@example/flow-fixture-react",
            "version": "0.1.0",
            "description": "React bindings for node-based editor flows.",
            "license": "MIT",
            "peerDependencies": {
              "react": "^19.0.0"
            },
            "exports": {
              ".": "./dist/index.js"
            }
          }
          EOF

      - name: Collect and draft candidate
        working-directory: SpecHarvester
        run: |
          fixture_revision="0000000000000000000000000000000000000000"
          python -m spec_harvester collect-local /tmp/spec-harvester-fixture \
            --repository https://github.com/example/flow-fixture \
            --revision "$fixture_revision" \
            --out /tmp/spec-harvester-candidate
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          from spec_harvester.interface_index import (
              analyzer_record,
              evidence_record,
              new_public_interface_index,
              render_public_interface_index_json,
          )

          source_path = Path("/tmp/spec-harvester-fixture/packages/react/src/index.js")
          source_digest = sha256(source_path.read_bytes()).hexdigest()
          index = new_public_interface_index(
              source_revision="0000000000000000000000000000000000000000",
              analyzers=[
                  analyzer_record(
                      "ci-static-public-api-fixture",
                      "0.1.0",
                      execution="none",
                      confidence="high",
                  )
              ],
              packages=[
                  {
                      "id": "@example/flow-fixture-react",
                      "path": "packages/react",
                      "language": "javascript",
                      "entrypoints": [
                          {
                              "path": "packages/react/src/index.js",
                              "symbols": [
                                  {
                                      "name": "createFlowFixture",
                                      "kind": "function",
                                      "visibility": "public",
                                      "signature": "createFlowFixture(options)",
                                      "evidence": evidence_record(
                                          "packages/react/src/index.js",
                                          source_digest,
                                      ),
                                  }
                              ],
                          }
                      ],
                  }
              ],
          )
          Path("/tmp/spec-harvester-candidate/public-interface-index.json").write_text(
              render_public_interface_index_json(index),
              encoding="utf-8",
          )
          PY
          python -m spec_harvester draft /tmp/spec-harvester-candidate \
            --package-id flow_fixture.core \
            --name "Flow Fixture" \
            --out /tmp/spec-harvester-candidate

      - name: Validate candidate with SpecPM
        run: |
          set -o pipefail
          python -m specpm.cli validate /tmp/spec-harvester-candidate --json \
            | tee /tmp/specpm-validation.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("/tmp/specpm-validation.json").read_text(encoding="utf-8"))
          if report.get("error_count"):
              raise SystemExit(f"SpecPM validation errors: {report}")
          diagnostics = report.get("errors", []) + report.get("warnings", [])
          codes = {item.get("code") for item in diagnostics}
          if "unknown_evidence_kind" in codes:
              raise SystemExit(f"unexpected unknown public interface evidence kind: {report}")
          spec_path = next(Path("/tmp/spec-harvester-candidate/specs").glob("*.spec.yaml"))
          spec = spec_path.read_text(encoding="utf-8")
          for required in (
              "kind: public_interface_index",
              "artifactKind: SpecHarvesterPublicInterfaceIndex",
              "mediaType: application/vnd.spec-harvester.public-interface-index+json",
              "schemaVersion: 2",
          ):
              if required not in spec:
                  raise SystemExit(f"{required!r} missing from {spec_path}")
          PY

      - name: Promote candidate
        run: |
          python -m spec_harvester promote /tmp/spec-harvester-candidate \
            --accepted-root /tmp/accepted \
            --manifest /tmp/accepted-packages.yml \
            --manifest-entry-path accepted/flow_fixture.core/0.1.0 \
            --specpm-command "python -m specpm.cli"

      - name: Generate SpecPM public index
        run: |
          cd /tmp
          python -m specpm.cli public-index generate \
            --manifest accepted-packages.yml \
            --output specpm-public-index \
            --registry http://localhost:8081 \
            --json
          test -f specpm-public-index/v0/status/index.json
          test -f specpm-public-index/v0/packages/flow_fixture.core/index.json
          test -f specpm-public-index/v0/intents/index.json
